<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AResto AR View</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #topbar,
    #hint {
      position: fixed;
      left: 12px;
      right: 12px;
      z-index: 10;
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(10px);
    }

    #topbar {
      top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-radius: 18px;
      padding: 10px 12px;
    }

    #title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 16px;
      font-weight: 800;
    }

    #close {
      flex: 0 0 auto;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      color: white;
      background: #f97316;
      font-weight: 800;
    }

    #hint {
      bottom: 16px;
      border-radius: 18px;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="topbar">
    <div id="title">AResto AR View</div>
    <button id="close" type="button">Back</button>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; trackingMethod: best;"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true">

    <a-camera id="camera" position="0 1.6 0"></a-camera>
    <a-entity light="type: ambient; intensity: 1.2"></a-entity>
    <a-entity light="type: directional; intensity: 0.8" position="1 3 2"></a-entity>

    <a-entity
      id="food"
      position="0 0 -2"
      rotation="0 25 0"
      scale="0.35 0.35 0.35"
      visible="true">
    </a-entity>
  </a-scene>

  <div id="hint">Tap the camera view to place the selected food in front of you.</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const modelUrl = params.get('model') || '/models/habit_cheeseburger.glb';
    const foodName = params.get('name') || 'Food preview';
    const food = document.querySelector('#food');
    const title = document.querySelector('#title');
    const closeButton = document.querySelector('#close');
    const scene = document.querySelector('a-scene');

    document.title = `${foodName} - AResto AR View`;
    title.textContent = foodName;
    food.setAttribute('gltf-model', modelUrl);

    closeButton.addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '/';
      }
    });

    scene.addEventListener('click', (event) => {
      const intersection = event.detail && event.detail.intersection;

      if (intersection && intersection.point) {
        food.setAttribute('position', intersection.point);
      } else {
        food.setAttribute('position', '0 0 -2');
      }

      food.setAttribute('visible', 'true');
    });
  </script>
</body>
</html>
